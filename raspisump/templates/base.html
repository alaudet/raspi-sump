<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Raspi-Sump{% endblock %}</title>
    <link rel="stylesheet" href="/static/raspi.css">
</head>
<body>
    {% include "_nav.html" %}

    <main>
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        <div class="flash-container">
            {% for category, message in messages %}
            <div class="flash flash-{{ category }}">{{ message }}</div>
            {% endfor %}
        </div>
        {% endif %}
        {% endwith %}
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>Raspi-Sump {{ version }} &mdash; &copy; 2026 Al Audet</p>
    </footer>

    <script>
    // Nav dropdown behaviour: close siblings on open; close on link click
    document.querySelectorAll('details.nav-dropdown').forEach(function(el) {
        el.addEventListener('toggle', function() {
            if (el.open) {
                document.querySelectorAll('details.nav-dropdown').forEach(function(other) {
                    if (other !== el) other.open = false;
                });
            }
        });
        el.querySelectorAll('a').forEach(function(a) {
            a.addEventListener('click', function() { el.open = false; });
        });
    });
    </script>
</body>
</html>
