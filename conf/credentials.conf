# Raspi-Sump credentials file
# This file should be located at /etc/raspi-sump/credentials.conf
# Permissions must be 0640 (root:raspisump) -- do not make this file world-readable.

[web]

# Admin interface password.
# Change this before using the admin interface.
# Future: replace with a bcrypt hash generated by rsumpadminpasswd utility.
admin_password = changeme

[credentials]

# SMTP authentication credentials
# Leave blank if smtp_authentication = 0 in raspisump.conf
username =
password =

# Mastodon application credentials
# Create an application on your Mastodon server to retrieve these values.
# Mastodon will not let you send DMs to yourself, so create a separate account
# for your app in addition to your Mastodon account for receiving messages.
client_id =
client_secret =
access_token =
api_base_url =
handle =
